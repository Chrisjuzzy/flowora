services:
  - type: web
    name: flowora-api
    runtime: python
    plan: free
    rootDir: apps/backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./test.db
      - key: USE_PGVECTOR
        value: "false"
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: CELERY_BROKER_URL
        value: redis://localhost:6379/0
      - key: CELERY_RESULT_BACKEND
        value: redis://localhost:6379/0
      - key: DEFAULT_AI_PROVIDER
        value: mock
      - key: ALLOW_LLM_MOCK_FALLBACK
        value: "true"
      - key: ENABLE_ASYNC_EXECUTION
        value: "false"
      - key: EMAIL_VERIFICATION_REQUIRED
        value: "false"
      - key: AUTO_VERIFY_EMAIL
        value: "true"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "120"
      - key: TIMEOUT_BUFFER_SECONDS
        value: "10"
      - key: OLLAMA_TIMEOUT_SECONDS
        value: "110"
      - key: MINIO_ENDPOINT
        value: localhost:9000
      - key: MINIO_SECURE
        value: "false"
      - key: LOG_LEVEL
        value: INFO
