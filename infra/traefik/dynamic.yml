http:
  routers:
    backend:
      rule: (Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/api`)
      entryPoints:
        - web
      service: backend
      middlewares:
        - backend-strip
      priority: 20
    frontend:
      rule: (Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/`)
      entryPoints:
        - web
      service: frontend
      priority: 1

  middlewares:
    backend-strip:
      stripPrefix:
        prefixes:
          - /api

  services:
    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"
