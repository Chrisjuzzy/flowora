apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: flowora
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: flowora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          env:
            - name: POSTGRES_USER
              value: "flowora"
            - name: POSTGRES_PASSWORD
              value: "flowora"
            - name: POSTGRES_DB
              value: "flowora"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: flowora
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
