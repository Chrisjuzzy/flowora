apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowora-ingress
  namespace: flowora
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flowora-api
                port:
                  number: 80
