apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flowora-api-hpa
  namespace: flowora
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flowora-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flowora-worker-hpa
  namespace: flowora
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flowora-worker
  minReplicas: 5
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
