app = "flowora-web"
primary_region = "sjc"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "../../apps/frontend/Dockerfile"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://flowora-api.fly.dev"
    NEXT_PUBLIC_SITE_URL = "https://flowora-web.fly.dev"
    NEXT_PUBLIC_DEMO_AGENT_ID = "1"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  NEXT_PUBLIC_API_URL = "https://flowora-api.fly.dev"
  NEXT_PUBLIC_SITE_URL = "https://flowora-web.fly.dev"
  NEXT_PUBLIC_DEMO_AGENT_ID = "1"

[processes]
  app = "node .next/standalone/server.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "45s"
    method = "GET"
    path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1024mb"
