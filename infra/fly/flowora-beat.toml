app = "flowora-beat"
primary_region = "sea"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "apps/backend/Dockerfile.production"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  LOG_LEVEL = "INFO"

[processes]
  app = "celery -A celery_app.celery_app beat --loglevel=INFO"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
